<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B-roll Thumbnail Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-card { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .thumbnail { max-width: 200px; max-height: 150px; object-fit: cover; border: 1px solid #ddd; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>B-roll Thumbnail Test</h1>
    <p>This page tests the B-roll thumbnail functionality.</p>
    
    <div class="test-card">
        <h3>Test 1: Working Thumbnail</h3>
        <p>This should show a thumbnail image for an existing video:</p>
        <img id="thumbnail1" class="thumbnail" alt="Test thumbnail">
        <div id="status1"></div>
    </div>
    
    <div class="test-card">
        <h3>Test 2: Fallback to Video</h3>
        <p>This should fall back to video player if thumbnail fails:</p>
        <div id="video-container">
            <img id="thumbnail2" class="thumbnail" alt="Test thumbnail" style="display: none;">
            <video id="video2" class="thumbnail" controls style="display: none;"></video>
        </div>
        <div id="status2"></div>
    </div>

    <script>
        // Simulate the frontend logic
        const API_BASE = 'http://localhost:47393/api';
        
        // Test credentials - you'll need to replace this with a valid token
        const TEST_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ0ZXN0dXNlciIsInVzZXJfaWQiOjEsImV4cCI6MTc2NDQyNTU2OCwiaWF0IjoxNzYxODMzNTY4LCJqdGkiOiI0NWM0MTM4ZS05OWZmLTQ2YTQtOWEyYi03NTc1YzhmYTYxNmUifQ.V0xfzCEJ4o9Z2kUAIcVm08dGzqb_vZx8x7QOEiTGfnE';
        
        function getThumbnailUrl(filename) {
            const baseFilename = filename.replace(/\.(mp4|avi|mov|mkv|webm)$/i, '');
            return `${API_BASE}/broll/files/${baseFilename}.jpg`;
        }
        
        function getVideoUrl(filename) {
            return `${API_BASE}/broll/files/${filename}`;
        }
        
        function addAuthHeaders(url) {
            return fetch(url, {
                headers: {
                    'Authorization': `Bearer ${TEST_TOKEN}`
                }
            });
        }
        
        // Test 1: Working thumbnail
        const thumbnail1 = document.getElementById('thumbnail1');
        const status1 = document.getElementById('status1');
        
        const thumbnailUrl1 = getThumbnailUrl('232561_small_af0931c9.mp4');
        thumbnail1.src = thumbnailUrl1;
        
        thumbnail1.onload = () => {
            status1.innerHTML = '<span class="success">✅ Thumbnail loaded successfully!</span>';
        };
        
        thumbnail1.onerror = () => {
            status1.innerHTML = '<span class="error">❌ Thumbnail failed to load</span>';
        };
        
        // Test 2: Fallback mechanism
        const thumbnail2 = document.getElementById('thumbnail2');
        const video2 = document.getElementById('video2');
        const status2 = document.getElementById('status2');
        
        // Try a thumbnail that might not exist to test fallback
        const thumbnailUrl2 = getThumbnailUrl('nonexistent_video.mp4');
        const videoUrl2 = getVideoUrl('232561_small_af0931c9.mp4');
        
        thumbnail2.src = thumbnailUrl2;
        thumbnail2.style.display = 'block';
        
        thumbnail2.onload = () => {
            status2.innerHTML = '<span class="success">✅ Thumbnail loaded (unexpected for this test)</span>';
        };
        
        thumbnail2.onerror = () => {
            // Fallback to video
            thumbnail2.style.display = 'none';
            video2.src = videoUrl2;
            video2.style.display = 'block';
            status2.innerHTML = '<span class="success">✅ Fallback to video player working!</span>';
        };
        
        // Set authorization headers for video
        video2.onloadstart = () => {
            // Note: In real implementation, you'd need to handle auth for video requests too
            status2.innerHTML += '<br><span class="success">📹 Video started loading</span>';
        };
        
        video2.onerror = () => {
            status2.innerHTML += '<br><span class="error">❌ Video also failed to load</span>';
        };
    </script>
</body>
</html>
